<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>티카투카 온라인 — 팬메이드 대전</title>
<!-- ▼▼▼ 구글 애드센스: 승인 후 ca-pub-0000000000000000 을 본인 게시자 ID로 교체하세요 ▼▼▼ -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0000000000000000" crossorigin="anonymous"></script>
<!-- ▲▲▲ 애드센스는 실제 도메인에 배포된 사이트에서만 광고가 표시됩니다 ▲▲▲ -->
<style>
  :root {
    --bg: #0d0f14; --panel: #171a22; --panel2: #1f2330;
    --gold: #d4af5f; --gold-dim: #8a7340;
    --text: #e8e2d2; --muted: #8b8fa0;
    --accent: #4fc3f7; --danger: #ef5350; --ok: #66bb6a;
    --die: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 50% -100px, #1c2030, var(--bg));
    color: var(--text); font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  h1 { font-size: 28px; color: var(--gold); letter-spacing: 6px; margin: 28px 0 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 24px; }
  .screen { display: none; width: 100%; max-width: 900px; padding: 0 14px 40px; }
  .screen.active { display: block; }
  .lobby-card {
    background: var(--panel); border: 1px solid #2a2f3e; border-radius: 14px;
    padding: 28px; max-width: 420px; margin: 0 auto; text-align: center;
  }
  .lobby-card input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333a4d;
    background: var(--panel2); color: var(--text); font-size: 15px; text-align: center;
    margin-bottom: 14px; outline: none;
  }
  .lobby-card input:focus { border-color: var(--gold-dim); }
  .btn {
    display: block; width: 100%; padding: 13px; margin: 8px 0; border-radius: 8px;
    border: 1px solid var(--gold-dim); background: linear-gradient(#2a2417, #1f1b10);
    color: var(--gold); font-size: 15px; font-weight: 600; cursor: pointer; transition: .15s;
  }
  .btn:hover { filter: brightness(1.25); }
  .btn.secondary { border-color: #333a4d; background: var(--panel2); color: var(--text); }
  .btn.small { width: auto; display: inline-block; padding: 8px 18px; font-size: 13px; margin: 4px; }
  .joinrow { display: flex; gap: 8px; }
  .joinrow input { margin-bottom: 0; text-transform: uppercase; }
  .joinrow .btn { width: 130px; margin: 0; }
  .notice { margin-top: 14px; color: var(--muted); font-size: 12px; line-height: 1.6; }
  .wait-card { text-align: center; padding: 60px 0; }
  .spinner {
    width: 42px; height: 42px; border: 4px solid #2a2f3e; border-top-color: var(--gold);
    border-radius: 50%; margin: 0 auto 18px; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .roomcode { font-size: 42px; letter-spacing: 12px; color: var(--gold); font-weight: 800; margin: 12px 0; }
  .topbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 10px; }
  .topbar > :first-child { justify-self: start; }
  .topbar > :last-child { justify-self: end; }
  .pname { font-size: 15px; font-weight: 700; padding: 6px 14px; border-radius: 8px; border: 1px solid transparent; }
  .pname.me { color: var(--accent); }
  .pname.opp { color: var(--danger); }
  .pname.turn { border-color: var(--gold); background: rgba(212,175,95,.08); box-shadow: 0 0 12px rgba(212,175,95,.25); }
  .vs { color: var(--gold-dim); font-weight: 800; }
  .board-wrap { background: var(--panel); border: 1px solid #2a2f3e; border-radius: 14px; padding: 16px; }
  .lines { display: flex; flex-direction: column; gap: 12px; }
  .line-row { display: grid; grid-template-columns: 44px max-content 34px max-content 44px; align-items: center; gap: 8px; justify-content: center; }
  .lscore { text-align: center; font-size: 18px; font-weight: 800; color: var(--muted); }
  .lscore.win { color: var(--ok); } .lscore.lose { color: var(--danger); }
  .mid { text-align: center; color: #3a4054; font-size: 12px; white-space: nowrap; }
  .slots {
    display: flex; gap: 6px; padding: 6px; border-radius: 10px; border: 1px dashed #2c3242;
    justify-content: flex-start; position: relative; box-sizing: border-box;
    width: calc(var(--die) * 3 + 26px);
  }
  .slots.mine { flex-direction: row-reverse; }
  .cell {
    width: var(--die); height: var(--die); border-radius: 9px; flex: none;
    border: 1px dashed #333a4d; background: rgba(255,255,255,.02);
  }
  .slots.legal { border-color: var(--gold); cursor: pointer; background: rgba(212,175,95,.07); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { background: rgba(212,175,95,.16); } }
  @keyframes diePop { 0% { transform: scale(.2) translateY(-20px); opacity: 0; } 60% { transform: scale(1.18); opacity: 1; } 100% { transform: scale(1); } }
  .die.pop { animation: diePop .35s ease-out; }
  @keyframes dieSlide { 0% { transform: translateX(var(--fromX)) scale(1.1); } 65% { transform: translateX(0) scale(1.18); } 100% { transform: none; } }
  .die.slide { animation: dieSlide .5s ease-out; z-index: 4; }
  @keyframes knockShake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-7px) rotate(-1deg); } 35% { transform: translateX(7px) rotate(1deg); } 55% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  .slots.knocked { animation: knockShake .5s ease; border: 1px solid var(--danger) !important; background: rgba(239,83,80,.18) !important; }
  @keyframes ghostFly {
    0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(.5); opacity: 0; }
  }
  .die.ghost-fly { position: absolute; top: 6px; left: 50%; margin-left: calc(var(--die) / -2); animation: ghostFly .75s ease-out forwards; pointer-events: none; z-index: 2; background: #e8b0a8; }
  @keyframes floatUp { 0% { transform: translate(-50%, 0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(-50%, -46px); opacity: 0; } }
  .knock-label { position: absolute; top: -8px; left: 50%; font-size: 17px; font-weight: 800; color: var(--danger); text-shadow: 0 0 8px rgba(239,83,80,.8); animation: floatUp 1s ease-out forwards; pointer-events: none; white-space: nowrap; z-index: 11; }
  .die {
    width: var(--die); height: var(--die); border-radius: 9px; background: #f4efe2; color: #1a1a1a;
    display: flex; align-items: center; justify-content: center; font-size: 34px; line-height: 1;
    box-shadow: 0 2px 5px rgba(0,0,0,.5); position: relative; user-select: none; flex: none;
  }
  .die.match2 { outline: 2px solid #59c7ff; box-shadow: 0 0 12px rgba(89,199,255,.8); z-index: 5; }
  .die.match3 { outline: 2px solid #ffd257; box-shadow: 0 0 16px rgba(255,210,87,.95); animation: matchPulse 1.1s ease-in-out infinite; z-index: 5; }
  @keyframes matchPulse { 50% { box-shadow: 0 0 26px rgba(255,210,87,1); } }
  .chain {
    width: 20px; height: 20px; border-radius: 5px; background: #f4efe2; color: #1a1a1a;
    display: flex; align-items: center; justify-content: center; font-size: 15px; line-height: 1;
    border: 2px solid #59c7ff; box-shadow: 0 0 7px rgba(89,199,255,.85);
    margin: 0 -13px; z-index: 6; align-self: center; flex: none; position: relative;
  }
  .chain.c3 { border-color: #ffd257; box-shadow: 0 0 9px rgba(255,210,87,.95); }
  @keyframes scoreBump { 0% { transform: scale(1); } 40% { transform: scale(1.5); color: var(--gold); } 100% { transform: scale(1); } }
  .lscore.bump { animation: scoreBump .55s ease; }
  .chain-label {
    position: absolute; top: -8px; left: 50%; font-size: 15px; font-weight: 800;
    animation: floatUp 1s ease-out forwards; pointer-events: none; white-space: nowrap; z-index: 11;
  }
  .chain-label.c2 { color: #59c7ff; text-shadow: 0 0 8px rgba(89,199,255,.85); }
  .chain-label.c3 { color: #ffd257; text-shadow: 0 0 8px rgba(255,210,87,.95); }
  .chain-label.gold { color: var(--gold); text-shadow: 0 0 8px rgba(212,175,95,.9); }
  .die.shield { background: linear-gradient(145deg, #ffe9b0, #d4af5f); box-shadow: 0 0 10px rgba(212,175,95,.7); }
  .die.shield::after {
    content: '🛡'; position: absolute; bottom: -6px; right: -6px; font-size: 14px;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.6));
  }
  .die.ghost { opacity: .35; background: #b9b4a5; }
  .die.mini { width: 26px; height: 26px; font-size: 19px; border-radius: 6px; }
  .die.mini.back { background: #3a4054; color: #6a7086; font-size: 14px; box-shadow: none; }
  .die.mini.swappable { outline: 1px dashed var(--gold); cursor: pointer; }
  .die.mini.swappable:hover { outline: 2px solid var(--gold); }
  .die.snipe-target { outline: 2px dashed var(--danger); cursor: crosshair; animation: pulse 1s ease-in-out infinite; }
  /* 양쪽 주사위 존 */
  .board-inner { display: flex; align-items: stretch; gap: 10px; }
  .board-inner .lines { flex: 1; }
  .side {
    flex: 0 1 150px; min-width: 112px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; padding: 10px;
    background: var(--panel2); border: 1px solid #2a2f3e; border-radius: 12px; transition: .2s;
  }
  .side.active-turn { border-color: var(--gold); box-shadow: 0 0 14px rgba(212,175,95,.25); }
  .side .hint { font-size: 11.5px; color: var(--muted); text-align: center; line-height: 1.55; }
  .side .hint b { color: var(--gold); }
  .side .btn.small { margin: 0; }
  .side .bigdie { width: 44px; height: 44px; font-size: 32px; }
  .side .offer { gap: 8px; }
  .side .offer .pick { padding: 4px 6px; }
  .side .idle-dice { font-size: 26px; opacity: .22; user-select: none; }
  .bigdie { width: 58px; height: 58px; font-size: 42px; border-radius: 11px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(212,175,95,.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .offer { display: flex; gap: 10px; align-items: center; }
  .offer.vertical { flex-direction: column; }
  .offer .pick { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 10px; border-radius: 10px; border: 1px solid #333a4d; transition: .15s; }
  .offer .pick:hover { border-color: var(--gold); background: rgba(212,175,95,.1); }
  .offer .pick span { font-size: 11px; color: var(--muted); }
  .item-chip {
    font-size: 11px; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--gold-dim);
    color: var(--gold); background: rgba(212,175,95,.08); white-space: nowrap;
  }
  .item-chip.used { opacity: .45; border-color: #333a4d; color: var(--muted); }
  .item-chip.back { border-color: #333a4d; color: var(--muted); }
  button.item-chip { cursor: pointer; font-weight: 600; }
  button.item-chip:disabled { opacity: .45; cursor: default; }
  button.item-chip.arm { border-color: var(--danger); color: var(--danger); background: rgba(239,83,80,.1); }
  .pocket { display: flex; gap: 5px; align-items: center; }
  .pocket span { font-size: 10px; color: var(--muted); }
  .log {
    margin-top: 12px; height: 96px; overflow-y: auto; background: #10131a; border: 1px solid #232838;
    border-radius: 10px; padding: 8px 12px; font-size: 12px; color: var(--muted); line-height: 1.7;
  }
  .log b { color: var(--gold); }
  .overlay { position: fixed; inset: 0; background: rgba(5,6,10,.82); display: none; align-items: center; justify-content: center; z-index: 50; }
  .overlay.active { display: flex; }
  .result-card { background: var(--panel); border: 1px solid var(--gold-dim); border-radius: 16px; padding: 36px 44px; text-align: center; max-width: 380px; }
  .result-card h2 { font-size: 30px; margin-bottom: 8px; }
  .result-card h2.win { color: var(--gold); } .result-card h2.lose { color: var(--danger); } .result-card h2.draw { color: var(--muted); }
  .result-card .detail { color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.8; }
  .streak-line { color: var(--gold); font-size: 16px; font-weight: 800; margin-bottom: 10px; }
  /* 아이템 카드 선택 */
  .card-wrap { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin: 18px 0; }
  .item-card {
    width: 158px; padding: 18px 14px; border-radius: 14px; border: 1px solid #333a4d;
    background: var(--panel2); text-align: center; cursor: pointer; transition: .15s;
  }
  .item-card:hover { border-color: var(--gold); background: rgba(212,175,95,.08); transform: translateY(-3px); }
  .item-card.chosen { border-color: var(--gold); box-shadow: 0 0 14px rgba(212,175,95,.35); }
  .item-card .ic { font-size: 36px; margin-bottom: 8px; }
  .item-card h3 { font-size: 15px; color: var(--gold); margin-bottom: 6px; }
  .item-card p { font-size: 11.5px; color: var(--muted); line-height: 1.55; }
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: #2a1518; color: #ff9a96; border: 1px solid #5c2b2e; padding: 10px 22px;
    border-radius: 10px; font-size: 13px; display: none; z-index: 60;
  }
  @media (max-width: 700px) {
    .board-inner { flex-direction: column; align-items: stretch; }
    .side { width: 100%; flex-direction: row; justify-content: center; flex-wrap: wrap; }
    #side-opp { order: 1; }
    .board-inner .lines { order: 2; }
    #side-me { order: 3; }
  }
  @media (max-width: 560px) {
    :root { --die: 36px; }
    .line-row { grid-template-columns: 30px max-content 20px max-content 30px; }
    .die { font-size: 26px; }
  }
  /* ---------- 광고 레이아웃 ---------- */
  .page { display: flex; justify-content: center; align-items: flex-start; gap: 18px; width: 100%; }
  .main-col { flex: 0 1 900px; min-width: 0; display: flex; flex-direction: column; align-items: center; }
  .ad-rail { width: 160px; flex: none; position: sticky; top: 16px; margin-top: 86px; }
  .ad-box { position: relative; border: 1px dashed #2c3242; border-radius: 8px; overflow: hidden; background: rgba(255,255,255,.015); }
  .ad-box::before {
    content: 'AD'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #3a4054; font-size: 12px; letter-spacing: 2px;
  }
  .ad-box ins { position: relative; z-index: 1; }
  .ad-rail .ad-box { min-height: 600px; }
  .ad-bottom { width: 100%; max-width: 872px; margin: 10px auto 28px; padding: 0 14px; }
  .ad-bottom .ad-box { min-height: 90px; }
  @media (max-width: 1260px) { .ad-rail { display: none; } }
  /* ▼ 광고 승인 전 임시 숨김 — 애드센스/애드핏 연동 시 아래 한 줄을 삭제하세요 ▼ */
  .ad-rail, .ad-bottom { display: none !important; }
</style>
</head>
<body>
<div class="page">
  <!-- 왼쪽 광고 (승인 후 data-ad-client / data-ad-slot 교체) -->
  <div class="ad-rail">
    <div class="ad-box">
      <ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px"
        data-ad-client="ca-pub-0000000000000000" data-ad-slot="1111111111"></ins>
    </div>
  </div>

  <div class="main-col">
  <h1>티카투카</h1>
  <div class="sub">온라인 대전 · 팬메이드 · 비공식</div>

  <!-- 로비 -->
  <div class="screen active" id="scr-lobby">
    <div class="lobby-card">
      <input id="nick" maxlength="12" placeholder="닉네임을 입력하세요">
      <button class="btn" id="btn-queue">⚔ 랜덤 매칭</button>
      <button class="btn secondary" id="btn-create">🔑 방 만들기 (친구 초대)</button>
      <div class="joinrow">
        <input id="code-in" maxlength="4" placeholder="초대 코드">
        <button class="btn secondary" id="btn-join">입장</button>
      </div>
      <button class="btn secondary" id="btn-ai">🤖 AI 대전 (연습)</button>
      <div class="notice">
        시작 전 <b style="color:var(--gold)">아이템 카드</b>(방어/저격/섞기) 하나를 선택 — 게임당 1회!<br>
        첫 턴엔 주사위 3개 중 1개 선택, 나머지 2개는 <b style="color:var(--gold)">포켓</b>에 (턴당 1회 교체)<br>
        더블 ×3 · 트리플 ×5 · 알까기 성공 시 알깐 주사위도 소멸 + 실드 보너스
      </div>
    </div>
  </div>

  <!-- 대기 -->
  <div class="screen" id="scr-wait">
    <div class="wait-card">
      <div class="spinner"></div>
      <div id="wait-msg">상대를 찾는 중…</div>
      <div class="roomcode" id="wait-code" style="display:none"></div>
      <button class="btn small secondary" id="btn-copy" style="display:none">코드 복사</button>
      <button class="btn small secondary" id="btn-cancel">취소</button>
    </div>
  </div>

  <!-- 게임 -->
  <div class="screen" id="scr-game">
    <div class="topbar">
      <div class="pname me" id="name-me">나</div>
      <div class="vs">VS</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="pname opp" id="name-opp">상대</div>
        <button id="btn-sound" title="효과음 켜기/끄기" style="background:none;border:1px solid #333a4d;border-radius:8px;color:var(--text);cursor:pointer;font-size:14px;padding:5px 9px;">🔊</button>
      </div>
    </div>
    <div class="board-wrap">
      <div class="board-inner">
        <div class="side" id="side-me"></div>
        <div class="lines" id="lines"></div>
        <div class="side" id="side-opp"></div>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <!-- 하단 광고 (반응형) -->
  <div class="ad-bottom">
    <div class="ad-box">
      <ins class="adsbygoogle" style="display:block"
        data-ad-client="ca-pub-0000000000000000" data-ad-slot="3333333333"
        data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>
  </div>
  </div><!-- /main-col -->

  <!-- 오른쪽 광고 -->
  <div class="ad-rail">
    <div class="ad-box">
      <ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px"
        data-ad-client="ca-pub-0000000000000000" data-ad-slot="2222222222"></ins>
    </div>
  </div>
</div><!-- /page -->

  <!-- 아이템 카드 선택 -->
  <div class="overlay" id="card-ov">
    <div class="result-card" style="max-width:560px">
      <h2 style="color:var(--gold);font-size:22px">아이템 카드 선택</h2>
      <div class="detail">게임 중 딱 한 번 쓸 수 있는 카드를 고르세요. 상대에겐 사용 전까지 비공개!</div>
      <div class="card-wrap" id="card-wrap"></div>
      <div class="detail" id="card-status"></div>
    </div>
  </div>

  <!-- 결과 -->
  <div class="overlay" id="overlay">
    <div class="result-card">
      <h2 id="res-title"></h2>
      <div class="streak-line" id="res-streak" style="display:none"></div>
      <div class="detail" id="res-detail"></div>
      <button class="btn small" id="btn-rematch">다시 대결</button>
      <button class="btn small secondary" id="btn-lobby">로비로</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const DIE = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const ITEM_INFO = {
  defense: { ic: '🛡', name: '방어', desc: '상대의 알까기·저격을 한 번 자동으로 무효화합니다.' },
  snipe:   { ic: '🎯', name: '저격', desc: '상대 주사위 하나를 지정해 제거합니다. (실드 포함)' },
  shuffle: { ic: '🔀', name: '섞기', desc: '내 3개 줄의 위치를 무작위로 재배치합니다.' }
};
let ws, S = null, prevSc = null, myName = '', sniping = false;

// ---------- 효과음 (WebAudio 합성) ----------
let AC = null, soundOn = localStorage.getItem('tikatuka-sound') !== 'off';
function ac() {
  if (!soundOn) return null;
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type='triangle', vol=.22, when=0, slideTo) {
  const c = ac(); if (!c) return;
  const t = c.currentTime + when;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(g).connect(c.destination);
  o.start(t); o.stop(t + dur + .02);
}
function noiseBurst(dur=.3, vol=.35) {
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const s = c.createBufferSource(); s.buffer = buf;
  const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
  const g = c.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(.001, t + dur);
  s.connect(f); f.connect(g); g.connect(c.destination);
  s.start(t);
}

function connect(then) {
  if (ws && ws.readyState === 1) return then();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  try { ws = new WebSocket(proto + '://' + location.host); }
  catch (e) { toast('서버에 연결할 수 없습니다.'); return; }
  ws.onopen = then;
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => { toast('서버와 연결이 끊어졌습니다.'); showScreen('lobby'); };
}
const send = o => ws && ws.readyState === 1 && ws.send(JSON.stringify(o));

function showScreen(name) {
  for (const s of ['lobby','wait','game']) $('scr-'+s).classList.toggle('active', s===name);
  if (name !== 'game') { $('overlay').classList.remove('active'); $('card-ov').classList.remove('active'); }
}
let toastT;
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastT); toastT = setTimeout(() => t.style.display='none', 2600);
}

  $('btn-copy').style.display = code ? 'inline-block' : 'none';

function handle(m) {
  switch (m.type) {
    case 'queued': waitUI('상대를 찾는 중…'); break;
    case 'room_created': waitUI('친구에게 코드를 알려주세요!', m.code); break;
    case 'matched':
      showScreen('game'); $('log').innerHTML = ''; prevSc = null; sniping = false;
      $('btn-rematch').style.display = 'inline-block';
      $('overlay').classList.remove('active');
      logMsg('<b>대전 시작!</b> ' + m.names[0] + ' vs ' + m.names[1]);
      break;
    case 'state': S = m; render(); break;
    case 'error': toast(m.msg); break;
    case 'opponent_left':
      toast('상대가 나갔습니다.');
      $('card-ov').classList.remove('active');
      $('res-title').textContent = '상대 이탈'; $('res-title').className = '';
      $('res-streak').style.display = 'none';
      $('res-detail').textContent = '상대가 게임을 떠났습니다.';
      $('btn-rematch').style.display = 'none';
      $('overlay').classList.add('active');
      break;
    case 'rematch_request': toast('상대가 재대결을 원합니다! [다시 대결]을 누르세요.'); break;
    case 'left': showScreen('lobby'); break;
  }
}

}

function spawnGhost(slotEl, dieV, dx, dy, delayMs) {
  const g = document.createElement('div');
  g.className = 'die ghost-fly';
  g.textContent = DIE[dieV];
  g.style.setProperty('--dx', dx + 'px');
  g.style.setProperty('--dy', dy + 'px');
  g.style.setProperty('--rot', ((Math.random() < .5 ? -1 : 1) * (120 + Math.random() * 240)) + 'deg');
  g.style.animationDelay = delayMs + 'ms';
  slotEl.appendChild(g);
  setTimeout(() => g.remove(), 900 + delayMs);
}
function lineLabel(absOwner, line, text, cls) {
  const el = document.querySelector(`.slots[data-owner="${absOwner}"][data-line="${line}"]`);
  if (!el) return;
  const label = document.createElement('div');
  label.className = cls || 'knock-label';
  label.textContent = text;
  el.appendChild(label);
  setTimeout(() => label.remove(), 1000);
}
function knockEffect(victimEl, atkEl, dieV, removed, victimIsOpp) {
  if (victimEl) {
    victimEl.classList.add('knocked');
    setTimeout(() => victimEl.classList.remove('knocked'), 550);
    const dir = victimIsOpp ? 1 : -1;
    for (let i = 0; i < removed; i++) {
      spawnGhost(victimEl, dieV, dir * (50 + Math.random() * 70), -30 + Math.random() * 70, i * 60);
    }
    const label = document.createElement('div');
    label.className = 'knock-label';
    label.textContent = '💥 알까기!';
    victimEl.appendChild(label);
    setTimeout(() => label.remove(), 1000);
  }
  if (atkEl) {
    const dirAtk = victimIsOpp ? 1 : -1;
    spawnGhost(atkEl, dieV, dirAtk * (60 + Math.random() * 40), -20 + Math.random() * 40, 0);
  }
}
function chainEffect(absOwner, line, dieV) {
  if (!S) return;
  const arr = S.boards[absOwner][line];
  const cnt = arr.filter(d => d.v === dieV).length;
  if (cnt < 2) return;
  const el = document.querySelector(`.slots[data-owner="${absOwner}"][data-line="${line}"]`);
  if (el) {
    const label = document.createElement('div');
    label.className = 'chain-label ' + (cnt >= 3 ? 'c3' : 'c2');
    label.textContent = cnt >= 3 ? '✨ 트리플 ×5!' : '✨ 더블 ×3!';
    el.appendChild(label);
    setTimeout(() => label.remove(), 1000);
  }
  sChain();
}
